# pnpm の設定。ネイティブビルドが必要な依存だけ、明示的にビルドを許可する。
# （無断でビルドスクリプトを走らせないのが pnpm のセキュリティ既定。許可リストで運用する）
allowBuilds:
  sharp: true
  unrs-resolver: true
  esbuild: true
  "@tailwindcss/oxide": true
  lefthook: true

# 既知の脆弱性対策などで依存のバージョンを強制する（pnpm 11 ではここが overrides の置き場）。
# postcss: next 経由で入る 8.4.31 に XSS(medium) があるため修正版以上に固定。
overrides:
  postcss: ">=8.5.10"
