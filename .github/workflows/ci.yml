name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同じブランチへ新しい push が来たら、走行中の古いCIをキャンセルする
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ★順序が重要: pnpm を先に入れてから Node をセットアップする。
      #   逆にすると「pnpm が見つからない」で初回CIが赤くなる。
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Loop engineering の「Verify」と同じ決定論的チェック（型・Lint/整形・テスト）。
      # ローカルの `pnpm verify` と完全に同一なので、CIが落ちたら手元で再現できる。
      - run: pnpm verify

      # 既知の高深刻度の脆弱性を検出（依存のサプライチェーン対策）。
      # 初日からテンプレを赤くしないため、ここでは警告どまり（マージはブロックしない）。
      # 赤が出たら `pnpm update` や該当依存の対応を検討すること。
      - name: Security audit (high+)
        run: pnpm audit --audit-level=high
        continue-on-error: true
